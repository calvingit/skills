name: Weekly Update External Skills

on:
  schedule:
    # GitHub Actions uses UTC. 04:00 UTC Monday = 12:00 Monday (UTC+8).
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-external-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run download script
        run: python scripts/download.py

      - name: Create pull request if there are changes
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/weekly-update-external-skills
          delete-branch: true
          title: "chore: weekly update external skills"
          body: |
            This PR is auto-generated by GitHub Actions.

            - Run `python scripts/download.py`
            - Update external third-party skills from `index.json`
          commit-message: "chore: weekly update external skills"
          labels: |
            automated
            dependencies

      - name: Enable auto-merge (squash)
        if: ${{ steps.cpr.outputs.pull-request-number }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
